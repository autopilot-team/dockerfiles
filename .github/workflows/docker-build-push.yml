name: Docker Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io

jobs:
  # Job to find changed Dockerfiles
  find-dockerfiles:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            dockerfiles/**/Dockerfile

      - name: Set matrix
        id: set-matrix
        run: |
          # Find all Dockerfiles
          dockerfiles=$(find dockerfiles -name "Dockerfile" -type f | sort)
          
          # If this is a PR, only include changed Dockerfiles
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            if [ -n "${{ steps.changed-files.outputs.all_changed_files }}" ]; then
              changed_dockerfiles="${{ steps.changed-files.outputs.all_changed_files }}"
              dockerfiles=$(echo "$changed_dockerfiles" | tr ' ' '\n' | sort)
            else
              dockerfiles=""
            fi
          fi
          
          # Build JSON array
          matrix_json="["
          first=true
          for dockerfile in $dockerfiles; do
            if [ -f "$dockerfile" ]; then
              dir=$(dirname "$dockerfile")
              name=$(basename "$dir")
              if [ "$first" = true ]; then
                first=false
              else
                matrix_json="$matrix_json,"
              fi
              matrix_json="$matrix_json{\"dockerfile\":\"$dockerfile\",\"context\":\"$dir\",\"name\":\"$name\"}"
            fi
          done
          matrix_json="$matrix_json]"
          
          echo "matrix=$matrix_json" >> $GITHUB_OUTPUT
          
          if [ "$matrix_json" == "[]" ]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
          else
            echo "has-changes=true" >> $GITHUB_OUTPUT
          fi
          
          echo "Matrix: $matrix_json"

  # Lint Dockerfiles with hadolint
  lint:
    needs: find-dockerfiles
    if: needs.find-dockerfiles.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        dockerfile: ${{ fromJson(needs.find-dockerfiles.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile.dockerfile }}
          failure-threshold: warning

  # Build and optionally push Docker images
  build-and-push:
    needs: [find-dockerfiles, lint]
    if: needs.find-dockerfiles.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        dockerfile: ${{ fromJson(needs.find-dockerfiles.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.dockerfile.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix={{branch}}-
            type=ref,event=pr

      - name: Build Docker image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.dockerfile }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Docker image (main branch)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.dockerfile.context }}
          file: ${{ matrix.dockerfile.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "Image pushed with digest ${{ steps.build-and-push.outputs.digest }}"
